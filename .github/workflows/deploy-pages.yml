name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Wasm distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Konan and JS store
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            kotlin-js-store
          key: ${{ runner.os }}-kotlin-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'kotlin-js-store/**') }}
          restore-keys: |
            ${{ runner.os }}-kotlin-

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Wasm browser distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace

      - name: Patch base href for GitHub Pages
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          DIST_DIR="composeApp/build/dist/wasmJs/productionExecutable"
          echo "Patching <base href> in ${DIST_DIR}/index.html to /${REPO_NAME}/"
          sed -i "s|<base href=\"/\">|<base href=\"/${REPO_NAME}/\">|" "${DIST_DIR}/index.html"
          cp "${DIST_DIR}/index.html" "${DIST_DIR}/404.html"
          echo "Result:"
          grep -n "<base" "${DIST_DIR}/index.html" "${DIST_DIR}/404.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
